<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0f172a;
            --accent-blue: #2563eb;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-900: #0f172a;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: #f3f4f6;
            margin: 0;
            padding: 40px 20px;
        }

        .report-container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            border-top: 6px solid var(--primary-blue);
            padding: 60px;
        }

        header {
            border-bottom: 2px solid var(--slate-900);
            margin-bottom: 40px;
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .report-type {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 2.25rem;
            color: var(--slate-900);
            margin: 0;
            line-height: 1.1;
        }

        .analyst-meta {
            text-align: right;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .analyst-meta b {
            color: var(--slate-900);
            display: block;
            font-weight: 600;
        }

        h2 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-blue);
            border-bottom: 1px solid var(--slate-200);
            padding-bottom: 8px;
            margin-top: 40px;
            margin-bottom: 16px;
            font-weight: 700;
        }

        h3 {
            font-size: 1.125rem;
            color: var(--slate-900);
            margin-top: 24px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        p {
            margin-top: 0;
            margin-bottom: 1rem;
        }

        .executive-summary {
            font-size: 1.125rem;
            line-height: 1.7;
            color: var(--slate-700);
            font-style: italic;
            border-left: 4px solid var(--slate-200);
            padding-left: 24px;
            margin: 32px 0;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        ul {
            padding-left: 1.25rem;
            margin: 0;
        }

        li {
            margin-bottom: 10px;
        }

        .metric-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .metric-table th {
            text-align: left;
            padding: 12px;
            background: var(--slate-50);
            color: var(--slate-600);
            font-weight: 600;
            border-bottom: 2px solid var(--slate-200);
        }

        .metric-table td {
            padding: 12px;
            border-bottom: 1px solid var(--slate-100);
        }

        .metric-table tr:last-child td {
            border-bottom: none;
        }

        .metric-value {
            font-family: 'Inter', monospace;
            font-weight: 600;
            color: var(--slate-900);
            text-align: right;
        }

        .report-footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid var(--slate-200);
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .confidential {
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #ef4444;
            font-weight: 700;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .report-container {
                box-shadow: none;
                border-top: none;
                max-width: 100%;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="report-container">
        {% block content %}{% endblock %}
        
        <footer class="report-footer">
            <div>
                <span class="confidential">Strictly Confidential</span><br>
                Rendered on {{ generated_at }}
            </div>
            <div style="text-align: right">
                Analytical Intelligence Service<br>
                Reference ID: {{ report.briefingId }}
            </div>
        </footer>
    </div>
</body>
</html>
